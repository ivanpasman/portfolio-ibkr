<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d0d">
<link rel="manifest" href="manifest.json">
<title>Portfolio</title>
<style>
:root {
  --bg: #0d0d0d;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: rgba(255,255,255,0.08);
  --text: #f0f0f0;
  --muted: #888;
  --green: #00d4a0;
  --red: #ff5e5e;
  --accent: #4f8ef7;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding-bottom: 2rem; }
header { padding: 3rem 1.25rem 1rem; }
header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
header p { font-size: 13px; color: var(--muted); margin-top: 2px; }
.summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 1.25rem 1.5rem; }
.stat { background: var(--surface); border-radius: 14px; padding: 14px 16px; }
.stat label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.stat .val { font-size: 22px; font-weight: 700; margin-top: 4px; letter-spacing: -0.5px; }
.stat.wide { grid-column: 1 / -1; }
.actions { display: flex; gap: 10px; padding: 0 1.25rem 1.5rem; }
.btn { flex: 1; padding: 13px; border-radius: 12px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: opacity 0.15s, transform 0.1s; }
.btn:active { opacity: 0.75; transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn svg { width: 16px; height: 16px; flex-shrink: 0; }
.section-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; padding: 0 1.25rem; margin-bottom: 10px; }
.cards { display: flex; flex-direction: column; gap: 8px; padding: 0 1.25rem; }
.card { background: var(--surface); border-radius: 16px; padding: 14px 16px; border: 1px solid var(--border); }
.card-head { display: flex; justify-content: space-between; align-items: flex-start; }
.sec-div { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.06); }
.sec-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.mgrid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.mgrid div label { font-size: 10px; color: var(--muted); display: block; margin-bottom: 2px; }
.mgrid div span { font-size: 13px; font-weight: 500; }
.pnl-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-track { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; }
.edit-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); flex-wrap: wrap; }
.edit-row label { font-size: 11px; color: var(--muted); white-space: nowrap; }
.edit-row input { flex: 1; min-width: 70px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; padding: 7px 10px; }
.edit-row input:focus { outline: none; border-color: var(--accent); }
.save-btn { padding: 7px 12px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
.del-btn { padding: 7px 12px; background: var(--red); border: none; border-radius: 8px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
.last-update { text-align: center; font-size: 11px; color: var(--muted); margin-top: 1.5rem; padding: 0 1.25rem; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; transition: transform 0.3s; z-index: 100; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }
.overlay { position: fixed; inset: 0; background: rgba(13,13,13,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 200; font-size: 14px; color: var(--muted); }
.big-sp { width: 36px !important; height: 36px !important; border-width: 3px !important; }
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; align-items: flex-end; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: #1a1a1a; border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 480px; }
.modal h2 { font-size: 17px; font-weight: 600; margin-bottom: 20px; }
.mfield { margin-bottom: 12px; }
.mfield label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
.mfield input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 16px; padding: 11px 14px; }
.mfield input:focus { outline: none; border-color: var(--accent); }
.msub { width: 100%; margin-top: 8px; padding: 14px; background: var(--accent); border: none; border-radius: 12px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
.pos { color: var(--green); }
.neg { color: var(--red); }
</style>
</head>
<body>

<header style="display:flex;justify-content:space-between;align-items:flex-start;">
  <div>
    <h1>Portfolio</h1>
    <p id="subtitle">Actualizá para ver precios en vivo</p>
  </div>
  <button onclick="syncFromGitHub()" id="sync-btn" style="background:none;border:none;padding:4px;cursor:pointer;margin-top:6px;" title="Sincronizar">
    <svg viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" width="22" height="22"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
  </button>
  <button onclick="openTokenModal()" style="background:none;border:none;padding:4px;cursor:pointer;margin-top:6px;" title="Configurar token">
    <svg viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" width="22" height="22"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
  </button>
</header>

<div class="summary">
  <div class="stat"><label>Valor actual</label><div class="val" id="total-value">—</div></div>
  <div class="stat"><label>Costo total</label><div class="val" id="total-cost">—</div></div>
  <div class="stat wide"><label>P&L total</label><div class="val" id="total-pnl">—</div></div>
</div>

<div class="actions">
  <button class="btn btn-primary" onclick="refreshAll()" id="refresh-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
    Actualizar
  </button>
  <button class="btn btn-secondary" onclick="toggleEdit()" id="edit-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
    Editar
  </button>
  <button class="btn btn-secondary" onclick="openModal()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 4v16m8-8H4"/></svg>
    Nueva
  </button>
</div>

<p class="section-title">Posiciones</p>
<div class="cards" id="cards-container"></div>
<p class="last-update" id="last-update"></p>
<div class="toast" id="toast"></div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h2>Nueva posicion</h2>
    <div class="mfield"><label>Ticker</label><input id="new-ticker" type="text" placeholder="ej. TSLA" /></div>
    <div class="mfield"><label>Precio promedio (USD)</label><input id="new-avg" type="number" placeholder="ej. 250.00" step="0.01" /></div>
    <div class="mfield"><label>Shares</label><input id="new-shares" type="number" placeholder="ej. 5" step="0.0001" /></div>
    <button class="msub" onclick="addPosition()">Agregar</button>
  </div>
</div>

<div class="modal-bg" id="token-modal">
  <div class="modal">
    <h2>GitHub Sync</h2>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Tu token se guarda solo en este dispositivo. Nunca se sube a ningún servidor.</p>
    <div class="mfield"><label>Personal Access Token</label><input id="token-input" type="password" placeholder="ghp_..." /></div>
    <button class="msub" onclick="saveToken()">Guardar token</button>
    <button onclick="closeTokenModal()" style="width:100%;margin-top:8px;padding:12px;background:none;border:1px solid var(--border);border-radius:12px;color:var(--muted);font-size:14px;cursor:pointer">Cancelar</button>
  </div>
</div>

<script>
// ── GitHub config ──────────────────────────────────────────────
var GH_OWNER = 'ivanpasman';
var GH_REPO  = 'Portfolio-IBKR';
var GH_FILE  = 'portfolio.json';
var GH_API   = 'https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/' + GH_FILE;

function getToken() { return localStorage.getItem('gh_token') || ''; }

// ── Portfolio data ─────────────────────────────────────────────
var portfolio = [
  { ticker: 'MELI',  avgPrice: 1690.41, shares: 1.2 },
  { ticker: 'IREN',  avgPrice: 60.48,   shares: 26 },
  { ticker: 'RKLB',  avgPrice: 66.96,   shares: 5 },
  { ticker: 'QQQ',   avgPrice: 439.87,  shares: 1.39 },
  { ticker: 'AMZN',  avgPrice: 213.01,  shares: 6.46 },
  { ticker: 'CIFR',  avgPrice: 16.64,   shares: 47 },
  { ticker: 'SPY',   avgPrice: 625.21,  shares: 27 },
  { ticker: 'ASTS',  avgPrice: 57.69,   shares: 24 },
  { ticker: 'LITE',  avgPrice: 1032.47, shares: 0.5 }
];

var prices = {};
var prevClose = {};
var editMode = false;
var ghSha = null; // current SHA of portfolio.json on GitHub

// ── Init: load from GitHub first, fallback to localStorage ─────
async function init() {
  var loaded = await loadFromGitHub();
  if (!loaded) {
    var saved = localStorage.getItem('portfolio_v3');
    if (saved) { try { portfolio = JSON.parse(saved); } catch(e) {} }
  }
  var cached = JSON.parse(localStorage.getItem('prices_cache') || 'null');
  if (cached && (Date.now() - cached.ts) < 8 * 60 * 60 * 1000) {
    prices = cached.prices || {};
    prevClose = cached.prevClose || {};
    var d = new Date(cached.ts);
    document.getElementById('last-update').textContent = 'Cache del ' + d.toLocaleDateString('es-AR') + ' ' + d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('subtitle').textContent = 'Precios en cache - actualizá para ver en vivo';
  }
  renderCards();
}

// ── GitHub: read ───────────────────────────────────────────────
async function loadFromGitHub() {
  var token = getToken();
  if (!token) return false;
  try {
    var res = await fetch(GH_API, {
      headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!res.ok) return false;
    var data = await res.json();
    ghSha = data.sha;
    var decoded = JSON.parse(atob(data.content.replace(/\n/g, '')));
    portfolio = decoded;
    localStorage.setItem('portfolio_v3', JSON.stringify(portfolio));
    updateSyncIndicator(true);
    return true;
  } catch(e) { return false; }
}

// ── GitHub: write ──────────────────────────────────────────────
async function saveToGitHub() {
  var token = getToken();
  if (!token) { showToast('Configurá el token primero'); openTokenModal(); return false; }
  try {
    var content = btoa(unescape(encodeURIComponent(JSON.stringify(portfolio, null, 2))));
    var body = { message: 'update portfolio', content: content };
    if (ghSha) body.sha = ghSha;
    var res = await fetch(GH_API, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + token,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    if (!res.ok) { var err = await res.json(); showToast('Error GitHub: ' + (err.message || res.status)); return false; }
    var data = await res.json();
    ghSha = data.content.sha;
    updateSyncIndicator(true);
    return true;
  } catch(e) { showToast('Error de red'); return false; }
}

// ── Save: local + GitHub ───────────────────────────────────────
async function save() {
  localStorage.setItem('portfolio_v3', JSON.stringify(portfolio));
  await saveToGitHub();
}

// ── Sync button: pull from GitHub ─────────────────────────────
async function syncFromGitHub() {
  if (!getToken()) { openTokenModal(); return; }
  var btn = document.getElementById('sync-btn');
  btn.innerHTML = '<div class="spinner"></div>';
  btn.disabled = true;
  var ok = await loadFromGitHub();
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 17l4 4 4-4m-4 4V3"/></svg> Sync';
  btn.disabled = false;
  if (ok) { renderCards(); showToast('Sincronizado'); }
  else { showToast('No se pudo sincronizar'); }
}

// ── Sync indicator ─────────────────────────────────────────────
function updateSyncIndicator(synced) {
  var sub = document.getElementById('subtitle');
  if (synced && sub.textContent.indexOf('cache') === -1) {
    // leave price subtitle as-is, just update sync dot in header
  }
  var dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.style.background = synced ? 'var(--green)' : 'var(--muted)';
  dot.title = synced ? 'Sincronizado con GitHub' : 'Sin token configurado';
}

// ── Token modal ────────────────────────────────────────────────
function openTokenModal() {
  document.getElementById('token-input').value = getToken();
  document.getElementById('token-modal').classList.add('open');
}
function closeTokenModal() { document.getElementById('token-modal').classList.remove('open'); }
function saveToken() {
  var t = document.getElementById('token-input').value.trim();
  if (!t) { showToast('Token vacío'); return; }
  localStorage.setItem('gh_token', t);
  closeTokenModal();
  showToast('Token guardado');
  syncFromGitHub();
}

// ── Format helpers ─────────────────────────────────────────────
function fmt(n, dec) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  dec = (dec !== undefined) ? dec : 2;
  return '$' + parseFloat(n).toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}
function fmtPct(n) {
  if (n === null || isNaN(n)) return '—';
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}

// ── Render ─────────────────────────────────────────────────────
function renderCards() {
  var container = document.getElementById('cards-container');
  container.innerHTML = '';

  var totalValue = 0, totalCost = 0;
  portfolio.forEach(function(pos) {
    var p = prices[pos.ticker];
    if (p) totalValue += pos.shares * p;
    totalCost += pos.shares * pos.avgPrice;
  });

  var enriched = portfolio.map(function(pos, idx) {
    var price = prices[pos.ticker];
    var pc = prevClose[pos.ticker];
    var cost = pos.shares * pos.avgPrice;
    var cv = price ? pos.shares * price : null;
    var pnl = cv !== null ? cv - cost : null;
    var pnlPct = pnl !== null ? (pnl / cost) * 100 : null;
    var wp = totalValue > 0 && cv ? (cv / totalValue * 100) : (totalCost > 0 ? cost / totalCost * 100 : null);
    var dayChangePct = (price && pc) ? ((price - pc) / pc * 100) : null;
    var dayChangeDlr = (price && pc) ? (price - pc) : null;
    var dayPnl = (dayChangeDlr !== null) ? dayChangeDlr * pos.shares : null;
    return { pos: pos, idx: idx, price: price, pc: pc, cost: cost, cv: cv, pnl: pnl, pnlPct: pnlPct, wp: wp, dayChangePct: dayChangePct, dayChangeDlr: dayChangeDlr, dayPnl: dayPnl };
  });

  // Summary table
  var summaryDiv = document.createElement('div');
  summaryDiv.style.cssText = 'padding: 0 1.25rem 1.25rem;';
  var sortedForSummary = enriched.slice().sort(function(a, b) {
    if (a.dayChangePct === null && b.dayChangePct === null) return 0;
    if (a.dayChangePct === null) return 1;
    if (b.dayChangePct === null) return -1;
    return b.dayChangePct - a.dayChangePct;
  });

  var tbl = '<div style="background:var(--surface);border-radius:16px;overflow:hidden;border:1px solid var(--border)">';
  tbl += '<div style="padding:12px 14px 8px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;border-bottom:1px solid var(--border)">Resumen · ordenado por rendimiento del dia</div>';
  tbl += '<table style="width:100%;border-collapse:collapse;">';
  tbl += '<thead><tr style="border-bottom:1px solid var(--border)">';
  tbl += '<th style="padding:8px 14px;font-size:10px;color:var(--muted);font-weight:500;text-align:left;">Ticker</th>';
  tbl += '<th style="padding:8px 8px;font-size:10px;color:var(--muted);font-weight:500;text-align:right;">Precio</th>';
  tbl += '<th style="padding:8px 8px;font-size:10px;color:var(--muted);font-weight:500;text-align:right;">Var%</th>';
  tbl += '<th style="padding:8px 14px 8px 8px;font-size:10px;color:var(--muted);font-weight:500;text-align:right;">Peso</th>';
  tbl += '</tr></thead><tbody>';

  sortedForSummary.forEach(function(e, i) {
    var bg = i % 2 === 1 ? 'background:rgba(255,255,255,0.02);' : '';
    var dcp = e.dayChangePct;
    var dcCol = dcp !== null ? (dcp >= 0 ? 'var(--green)' : 'var(--red)') : 'var(--muted)';
    var dcStr = dcp !== null ? (dcp >= 0 ? '+' : '') + dcp.toFixed(2) + '%' : '—';
    var wpStr = e.wp !== null ? e.wp.toFixed(1) + '%' : '—';
    var priceStr = e.price ? fmt(e.price) : '—';
    tbl += '<tr style="' + bg + 'border-bottom:1px solid rgba(255,255,255,0.04)">';
    tbl += '<td style="padding:9px 14px;font-size:13px;font-weight:700;">' + e.pos.ticker + '</td>';
    tbl += '<td style="padding:9px 8px;font-size:13px;text-align:right;color:var(--text);">' + priceStr + '</td>';
    tbl += '<td style="padding:9px 8px;font-size:13px;font-weight:600;text-align:right;color:' + dcCol + ';">' + dcStr + '</td>';
    tbl += '<td style="padding:9px 14px 9px 8px;font-size:12px;text-align:right;color:var(--accent);">' + wpStr + '</td>';
    tbl += '</tr>';
  });

  tbl += '</tbody></table></div>';
  summaryDiv.innerHTML = tbl;
  container.appendChild(summaryDiv);

  // Detail cards
  var labelDiv = document.createElement('p');
  labelDiv.style.cssText = 'font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;padding:4px 1.25rem 10px;';
  labelDiv.textContent = 'Detalle · ordenado por volumen en cartera';
  container.appendChild(labelDiv);

  var sortedForDetail = enriched.slice().sort(function(a, b) {
    var va = a.cv !== null ? a.cv : a.cost;
    var vb = b.cv !== null ? b.cv : b.cost;
    return vb - va;
  });

  sortedForDetail.forEach(function(e) {
    var pos = e.pos; var idx = e.idx;
    var price = e.price; var pc = e.pc; var cost = e.cost; var cv = e.cv;
    var pnl = e.pnl; var pnlPct = e.pnlPct; var wp = e.wp;
    var priceCol = price ? (price >= pos.avgPrice ? 'var(--green)' : 'var(--red)') : 'var(--text)';
    var pnlCol = pnl !== null ? (pnl >= 0 ? 'var(--green)' : 'var(--red)') : 'var(--muted)';
    var cvCol = cv !== null ? (cv >= cost ? 'var(--green)' : 'var(--red)') : 'var(--muted)';
    var h = '';
    h += '<div class="card-head">';
    h += '<div><div style="font-size:20px;font-weight:700;">' + pos.ticker + '</div>';
    h += '<div style="font-size:12px;color:var(--muted);margin-top:2px">' + pos.shares + ' acciones</div></div>';
    h += '<div style="font-size:20px;font-weight:700;color:' + priceCol + '">' + (price ? fmt(price) : '—') + '</div>';
    h += '</div>';
    if (price && pc) {
      var dc = price - pc; var dcp = (dc / pc) * 100; var dp = dc * pos.shares;
      var sg = dc >= 0 ? '+' : ''; var cl = dc >= 0 ? 'var(--green)' : 'var(--red)';
      var bw = Math.min(Math.abs(dcp) * 5, 100).toFixed(1);
      h += '<div class="sec-div"><div class="sec-lbl">Movimiento del dia</div>';
      h += '<div class="mgrid">';
      h += '<div><label>Cierre ayer</label><span>' + fmt(pc) + '</span></div>';
      h += '<div><label>Var. $</label><span style="color:' + cl + '">' + sg + fmt(dc, 2) + '</span></div>';
      h += '<div><label>P&L dia</label><span style="color:' + cl + '">' + sg + fmt(dp, 0) + '</span></div>';
      h += '</div>';
      h += '<div class="bar-row"><div class="bar-track"><div class="bar-fill" style="width:' + bw + '%;background:' + cl + '"></div></div>';
      h += '<span style="font-size:12px;font-weight:600;color:' + cl + ';min-width:52px;text-align:right">' + sg + dcp.toFixed(2) + '%</span></div>';
      h += '</div>';
    }
    h += '<div class="sec-div"><div class="sec-lbl">Historico</div>';
    h += '<div class="mgrid">';
    h += '<div><label>Costo prom.</label><span>' + fmt(pos.avgPrice) + '</span></div>';
    h += '<div><label>Invertido</label><span>' + fmt(cost, 0) + '</span></div>';
    h += '<div><label>Valor hoy</label><span style="color:' + cvCol + '">' + (cv !== null ? fmt(cv, 0) : '—') + '</span></div>';
    h += '</div>';
    h += '<div class="pnl-row">';
    h += '<span style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px">P&L total</span>';
    h += '<span style="font-size:15px;font-weight:600;color:' + pnlCol + '">' + (pnl !== null ? (pnl >= 0 ? '+' : '') + fmt(pnl) + ' (' + fmtPct(pnlPct) + ')' : '—') + '</span>';
    h += '</div>';
    if (wp !== null) {
      var wb = Math.min(wp, 100).toFixed(1);
      h += '<div class="bar-row"><div class="bar-track"><div class="bar-fill" style="width:' + wb + '%;background:var(--accent)"></div></div>';
      h += '<span style="font-size:11px;color:var(--accent);min-width:72px;text-align:right">' + wp.toFixed(1) + '% cartera</span></div>';
    }
    h += '</div>';
    if (editMode) {
      h += '<div class="edit-row">';
      h += '<label>P. prom.</label><input type="number" id="avg-' + idx + '" value="' + pos.avgPrice + '" step="0.01">';
      h += '<label>Shares</label><input type="number" id="sh-' + idx + '" value="' + pos.shares + '" step="0.0001">';
      h += '<button class="save-btn" onclick="savePos(' + idx + ')">OK</button>';
      h += '<button class="del-btn" onclick="removePos(' + idx + ')">x</button>';
      h += '</div>';
    }
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = h;
    container.appendChild(card);
  });

  var tp = totalValue > 0 ? totalValue - totalCost : null;
  var tpp = tp !== null ? (tp / totalCost) * 100 : null;
  document.getElementById('total-value').textContent = totalValue > 0 ? fmt(totalValue, 0) : '—';
  document.getElementById('total-cost').textContent = fmt(totalCost, 0);
  var el = document.getElementById('total-pnl');
  el.className = 'val ' + (tp !== null ? (tp >= 0 ? 'pos' : 'neg') : '');
  el.textContent = tp !== null ? (tp >= 0 ? '+' : '') + fmt(tp, 0) + ' (' + fmtPct(tpp) + ')' : '—';
}

// ── Edit / Add / Remove ────────────────────────────────────────
async function savePos(idx) {
  var avg = parseFloat(document.getElementById('avg-' + idx).value);
  var sh = parseFloat(document.getElementById('sh-' + idx).value);
  if (isNaN(avg) || avg <= 0 || isNaN(sh) || sh <= 0) { showToast('Valores invalidos'); return; }
  portfolio[idx].avgPrice = avg;
  portfolio[idx].shares = sh;
  showToast('Guardando...');
  await save(); renderCards(); showToast('Guardado');
}

async function removePos(idx) {
  if (!confirm('Eliminar ' + portfolio[idx].ticker + '?')) return;
  portfolio.splice(idx, 1);
  await save(); renderCards(); showToast('Eliminado');
}

function toggleEdit() {
  editMode = !editMode;
  document.getElementById('edit-btn').innerHTML = editMode
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg> Listo'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg> Editar';
  renderCards();
}

function openModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('new-ticker').value = '';
  document.getElementById('new-avg').value = '';
  document.getElementById('new-shares').value = '';
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function addPosition() {
  var t = document.getElementById('new-ticker').value.trim().toUpperCase();
  var avg = parseFloat(document.getElementById('new-avg').value);
  var sh = parseFloat(document.getElementById('new-shares').value);
  if (!t) { showToast('Ingresa un ticker'); return; }
  if (isNaN(avg) || avg <= 0) { showToast('Precio invalido'); return; }
  if (isNaN(sh) || sh <= 0) { showToast('Shares invalido'); return; }
  if (portfolio.find(function(p) { return p.ticker === t; })) { showToast(t + ' ya existe'); return; }
  portfolio.push({ ticker: t, avgPrice: avg, shares: sh });
  closeModal();
  showToast('Guardando...');
  await save(); renderCards(); showToast(t + ' agregado');
}

// ── Price fetch ────────────────────────────────────────────────
async function fetchPrice(ticker) {
  try {
    var res = await fetch('https://finnhub.io/api/v1/quote?symbol=' + ticker + '&token=d81kkc9r01qrojfbvr00d81kkc9r01qrojfbvr0g');
    var data = await res.json();
    if (data && data.c) return { c: data.c, pc: data.pc || null };
    return null;
  } catch(e) { return null; }
}

async function refreshAll() {
  var btn = document.getElementById('refresh-btn');
  btn.innerHTML = '<div class="spinner"></div> Actualizando...';
  btn.disabled = true;
  var ov = document.createElement('div');
  ov.className = 'overlay';
  ov.innerHTML = '<div class="spinner big-sp"></div><span>Obteniendo precios...</span>';
  document.body.appendChild(ov);
  var tickers = portfolio.map(function(p) { return p.ticker; });
  var results = await Promise.allSettled(tickers.map(function(t) { return fetchPrice(t); }));
  var updated = 0;
  results.forEach(function(res, i) {
    if (res.status === 'fulfilled' && res.value) {
      prices[tickers[i]] = res.value.c;
      prevClose[tickers[i]] = res.value.pc;
      updated++;
    }
  });
  ov.remove();
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> Actualizar';
  btn.disabled = false;
  var now = new Date();
  var ts = now.toLocaleDateString('es-AR') + ' ' + now.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('last-update').textContent = 'Ultima actualizacion: ' + ts + ' - ' + updated + '/' + tickers.length + ' tickers';
  document.getElementById('subtitle').textContent = updated + ' de ' + tickers.length + ' tickers actualizados';
  localStorage.setItem('prices_cache', JSON.stringify({ ts: Date.now(), prices: prices, prevClose: prevClose }));
  renderCards();
  if (updated < tickers.length) showToast((tickers.length - updated) + ' ticker(s) sin precio');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

// ── Start ──────────────────────────────────────────────────────
init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
