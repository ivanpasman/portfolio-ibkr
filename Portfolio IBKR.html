<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Portfolio</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888;
    --green: #00d4a0;
    --red: #ff5e5e;
    --accent: #4f8ef7;
    --font: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; padding-bottom: 2rem; }

  header { padding: 3rem 1.25rem 1rem; }
  header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  header p { font-size: 13px; color: var(--muted); margin-top: 2px; }

  .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 1.25rem 1.5rem; }
  .stat { background: var(--surface); border-radius: 14px; padding: 14px 16px; }
  .stat label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat .val { font-size: 22px; font-weight: 700; margin-top: 4px; letter-spacing: -0.5px; }
  .stat.wide { grid-column: 1 / -1; }

  .actions { display: flex; gap: 10px; padding: 0 1.25rem 1.5rem; }
  .btn { flex: 1; padding: 13px; border-radius: 12px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: opacity 0.15s, transform 0.1s; }
  .btn:active { opacity: 0.75; transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  .section-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; padding: 0 1.25rem; margin-bottom: 10px; }

  .cards { display: flex; flex-direction: column; gap: 8px; padding: 0 1.25rem; }

  .card { background: var(--surface); border-radius: 16px; padding: 14px 16px; border: 1px solid var(--border); }
  .card-head { display: flex; justify-content: space-between; align-items: flex-start; }
  .ticker { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .card-price { text-align: right; }
  .card-price .current { font-size: 17px; font-weight: 600; }
  .card-price .change { font-size: 12px; margin-top: 2px; }
  .card-body { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .metric label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.3px; display: block; margin-bottom: 2px; }
  .metric span { font-size: 13px; font-weight: 500; }
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .neutral { color: var(--text); }

  .edit-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .edit-row label { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .edit-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; padding: 7px 10px; font-family: var(--font); }
  .edit-row input:focus { outline: none; border-color: var(--accent); }
  .save-btn { padding: 7px 14px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }

  .last-update { text-align: center; font-size: 11px; color: var(--muted); margin-top: 1.5rem; padding: 0 1.25rem; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; transition: transform 0.3s; z-index: 100; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .loading-overlay { position: fixed; inset: 0; background: rgba(13,13,13,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 200; font-size: 14px; color: var(--muted); }
  .loading-overlay .big-spinner { width: 36px; height: 36px; border-width: 3px; }
</style>
</head>
<body>

<header>
  <h1>Portfolio</h1>
  <p id="subtitle">Actualizá para ver precios en vivo</p>
</header>

<div class="summary">
  <div class="stat">
    <label>Valor actual</label>
    <div class="val" id="total-value">—</div>
  </div>
  <div class="stat">
    <label>Costo total</label>
    <div class="val" id="total-cost">—</div>
  </div>
  <div class="stat wide">
    <label>P&amp;L total</label>
    <div class="val" id="total-pnl">—</div>
  </div>
</div>

<div class="actions">
  <button class="btn btn-primary" onclick="refreshAll()" id="refresh-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
    Actualizar
  </button>
  <button class="btn btn-secondary" onclick="toggleEdit()" id="edit-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
    Editar
  </button>
  <button class="btn btn-secondary" onclick="showAddModal()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 4v16m8-8H4"/></svg>
    Nueva
  </button>
</div>

<div id="add-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:300; align-items:flex-end; justify-content:center;">
  <div style="background:#1a1a1a; border-radius:20px 20px 0 0; padding:24px 20px 40px; width:100%; max-width:480px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <span style="font-size:17px; font-weight:600;">Nueva posición</span>
      <button onclick="hideAddModal()" style="background:none; border:none; color:#888; font-size:24px; cursor:pointer; padding:0;">×</button>
    </div>
    <div style="display:flex; flex-direction:column; gap:12px;">
      <div>
        <label style="font-size:11px; color:#888; text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:6px;">Ticker</label>
        <input id="new-ticker" type="text" placeholder="ej. TSLA" style="width:100%; background:#242424; border:1px solid rgba(255,255,255,0.08); border-radius:10px; color:#f0f0f0; font-size:16px; padding:11px 14px; text-transform:uppercase;" />
      </div>
      <div>
        <label style="font-size:11px; color:#888; text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:6px;">Precio promedio (USD)</label>
        <input id="new-avg" type="number" placeholder="ej. 250.00" step="0.01" style="width:100%; background:#242424; border:1px solid rgba(255,255,255,0.08); border-radius:10px; color:#f0f0f0; font-size:16px; padding:11px 14px;" />
      </div>
      <div>
        <label style="font-size:11px; color:#888; text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:6px;">Capital invertido (USD)</label>
        <input id="new-invested" type="number" placeholder="ej. 1000.00" step="0.01" style="width:100%; background:#242424; border:1px solid rgba(255,255,255,0.08); border-radius:10px; color:#f0f0f0; font-size:16px; padding:11px 14px;" />
      </div>
      <button onclick="addPosition()" style="margin-top:8px; padding:14px; background:#4f8ef7; border:none; border-radius:12px; color:#fff; font-size:15px; font-weight:600; cursor:pointer; width:100%;">Agregar posición</button>
    </div>
  </div>
</div>

<p class="section-title">Posiciones</p>
<div class="cards" id="cards-container"></div>

<p class="last-update" id="last-update"></p>
<div class="toast" id="toast"></div>

<script>
const PROXY = 'https://query1.finance.yahoo.com/v8/finance/chart/';

localStorage.removeItem('portfolio_v2');
let portfolio = JSON.parse(localStorage.getItem('portfolio_v2') || 'null') || [
  { ticker: 'MELI',  avgPrice: 1690.41, invested: 2028.49,  shares: 1.2 },
  { ticker: 'CROX',  avgPrice: 91.34,   invested: 456.70,   shares: 5 },
  { ticker: 'IREN',  avgPrice: 60.48,   invested: 1572.48,  shares: 26 },
  { ticker: 'RKLB',  avgPrice: 66.96,   invested: 334.80,   shares: 5 },
  { ticker: 'QQQ',   avgPrice: 439.87,  invested: 611.42,   shares: 1.39 },
  { ticker: 'AMZN',  avgPrice: 213.01,  invested: 1375.84,  shares: 6.46 },
  { ticker: 'CIFR',  avgPrice: 16.64,   invested: 782.08,   shares: 47 },
  { ticker: 'SPY',   avgPrice: 625.21,  invested: 16880.67, shares: 27 },
  { ticker: 'ASTS',  avgPrice: 57.69,   invested: 1384.56,  shares: 24 },
];

portfolio.forEach(p => {
  if (!p.shares) p.shares = parseFloat((p.invested / p.avgPrice).toFixed(4));
});

let prices = {};
let editMode = false;

function save() {
  localStorage.setItem('portfolio_v2', JSON.stringify(portfolio));
}

function fmt(n, decimals = 2) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return '$' + parseFloat(n).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function fmtPct(n) {
  if (isNaN(n)) return '—';
  const sign = n >= 0 ? '+' : '';
  return sign + n.toFixed(2) + '%';
}

function renderCards() {
  const container = document.getElementById('cards-container');
  container.innerHTML = '';
  let totalValue = 0, totalCost = 0;

  portfolio.forEach((pos, idx) => {
    const price = prices[pos.ticker];
    const currentValue = price ? pos.shares * price : null;
    const cost = pos.shares * pos.avgPrice;
    const pnl = currentValue !== null ? currentValue - cost : null;
    const pnlPct = pnl !== null ? (pnl / cost) * 100 : null;

    if (currentValue) totalValue += currentValue;
    totalCost += cost;

    const priceClass = price ? (price >= pos.avgPrice ? 'pos' : 'neg') : 'neutral';
    const pnlClass = pnl !== null ? (pnl >= 0 ? 'pos' : 'neg') : 'neutral';

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-head">
        <div>
          <div class="ticker">${pos.ticker}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">${pos.shares.toFixed(4)} acciones</div>
        </div>
        <div class="card-price">
          <div class="current ${priceClass}">${price ? fmt(price) : '—'}</div>
          <div class="change ${pnlClass}">${pnlPct !== null ? fmtPct(pnlPct) : 'sin precio'}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="metric">
          <label>Costo prom.</label>
          <span>${fmt(pos.avgPrice)}</span>
        </div>
        <div class="metric">
          <label>Invertido</label>
          <span>${fmt(pos.shares * pos.avgPrice, 0)}</span>
        </div>
        <div class="metric">
          <label>Valor hoy</label>
          <span class="${currentValue !== null ? (currentValue >= cost ? 'pos' : 'neg') : 'neutral'}">${currentValue !== null ? fmt(currentValue, 0) : '—'}</span>
        </div>
        <div class="metric" style="grid-column: 1 / -1">
          <label>P&amp;L</label>
          <span class="${pnlClass}" style="font-size:15px">${pnl !== null ? (pnl >= 0 ? '+' : '') + fmt(pnl) + ' (' + fmtPct(pnlPct) + ')' : '—'}</span>
        </div>
      </div>
      ${editMode ? `
      <div class="edit-row">
        <label>P. prom.</label>
        <input type="number" value="${pos.avgPrice}" id="avg-${idx}" step="0.01" />
        <label>Shares</label>
        <input type="number" value="${pos.shares}" id="inv-${idx}" step="0.0001" />
        <button class="save-btn" onclick="savePos(${idx})">OK</button>
        <button class="save-btn" style="background:#ff5e5e;" onclick="removePos(${idx})">✕</button>
      </div>` : ''}
    `;
    container.appendChild(card);
  });

  const totalPnl = totalValue > 0 ? totalValue - totalCost : null;
  const totalPnlPct = totalPnl !== null ? (totalPnl / totalCost) * 100 : null;
  const pnlClass = totalPnl !== null ? (totalPnl >= 0 ? 'pos' : 'neg') : 'neutral';

  document.getElementById('total-value').textContent = totalValue > 0 ? fmt(totalValue, 0) : '—';
  document.getElementById('total-cost').textContent = fmt(totalCost, 0);
  const pnlEl = document.getElementById('total-pnl');
  pnlEl.className = 'val ' + pnlClass;
  pnlEl.textContent = totalPnl !== null ? (totalPnl >= 0 ? '+' : '') + fmt(totalPnl, 0) + ' (' + fmtPct(totalPnlPct) + ')' : '—';
}

function removePos(idx) {
  if (!confirm('¿Eliminar ' + portfolio[idx].ticker + '?')) return;
  portfolio.splice(idx, 1);
  save();
  renderCards();
  showToast('Posición eliminada');
}

function savePos(idx) {
  const avgInput = parseFloat(document.getElementById(`avg-${idx}`).value);
  const invInput = parseFloat(document.getElementById(`inv-${idx}`).value);
  if (isNaN(avgInput) || avgInput <= 0 || isNaN(invInput) || invInput <= 0) {
    showToast('Valores inválidos');
    return;
  }
  portfolio[idx].avgPrice = avgInput;
  portfolio[idx].shares = invInput;
  portfolio[idx].invested = parseFloat((invInput * avgInput).toFixed(2));
  save();
  renderCards();
  showToast('Guardado ✓');
}

function toggleEdit() {
  editMode = !editMode;
  document.getElementById('edit-btn').innerHTML = editMode
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg> Listo`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg> Editar`;
  renderCards();
}

async function fetchPrice(ticker) {
  try {
    const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=d81kkc9r01qrojfbvr00d81kkc9r01qrojfbvr0g`);
    const data = await res.json();
    return data?.c || null;
  } catch {
    return null;
  }
}

async function refreshAll() {
  const btn = document.getElementById('refresh-btn');
  btn.innerHTML = `<div class="spinner"></div> Actualizando...`;
  btn.disabled = true;

  const overlay = document.createElement('div');
  overlay.className = 'loading-overlay';
  overlay.innerHTML = `<div class="spinner big-spinner"></div><span>Obteniendo precios...</span>`;
  document.body.appendChild(overlay);

  const tickers = portfolio.map(p => p.ticker);
  const results = await Promise.allSettled(tickers.map(t => fetchPrice(t)));
  
  let updated = 0;
  results.forEach((res, i) => {
    if (res.status === 'fulfilled' && res.value) {
      prices[tickers[i]] = res.value;
      updated++;
    }
  });

  overlay.remove();
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> Actualizar precios`;
  btn.disabled = false;

  const now = new Date();
  const timeStr = now.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
  const dateStr = now.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
  document.getElementById('last-update').textContent = `Última actualización: ${dateStr} ${timeStr} · ${updated}/${tickers.length} precios obtenidos`;
  document.getElementById('subtitle').textContent = `${updated} de ${tickers.length} tickers actualizados`;

  localStorage.setItem('prices_cache', JSON.stringify({ ts: Date.now(), prices }));
  renderCards();
  if (updated < tickers.length) showToast(`${tickers.length - updated} ticker(s) sin precio`);
}

function showAddModal() {
  const modal = document.getElementById('add-modal');
  modal.style.display = 'flex';
  document.getElementById('new-ticker').value = '';
  document.getElementById('new-avg').value = '';
  document.getElementById('new-invested').value = '';
  setTimeout(() => document.getElementById('new-ticker').focus(), 100);
}

function hideAddModal() {
  document.getElementById('add-modal').style.display = 'none';
}

function addPosition() {
  const ticker = document.getElementById('new-ticker').value.trim().toUpperCase();
  const avg = parseFloat(document.getElementById('new-avg').value);
  const invested = parseFloat(document.getElementById('new-invested').value);
  if (!ticker) { showToast('Ingresá un ticker'); return; }
  if (isNaN(avg) || avg <= 0) { showToast('Precio promedio inválido'); return; }
  if (isNaN(invested) || invested <= 0) { showToast('Capital inválido'); return; }
  if (portfolio.find(p => p.ticker === ticker)) { showToast(ticker + ' ya existe'); return; }
  const shares = parseFloat((invested / avg).toFixed(4));
  portfolio.push({ ticker, avgPrice: avg, invested, shares });
  save();
  hideAddModal();
  renderCards();
  showToast(ticker + ' agregado ✓');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

const cached = JSON.parse(localStorage.getItem('prices_cache') || 'null');
if (cached && (Date.now() - cached.ts) < 8 * 60 * 60 * 1000) {
  prices = cached.prices;
  const d = new Date(cached.ts);
  document.getElementById('last-update').textContent = `Cache del ${d.toLocaleDateString('es-AR')} ${d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })}`;
  document.getElementById('subtitle').textContent = 'Precios en caché · actualizá para ver en vivo';
}

renderCards();
</script>
</body>
</html>
